<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Round Punisher - Платишь телом за каждый раунд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Левая часть - текст -->
        <div class="left-section">
            <div class="label">CS2 · FITNESS DUEL</div>
            
            <h1 class="heading">
                <span class="text-white">Платишь</span><br>
                <span class="text-white">телом за</span><br>
                <span class="text-gold italic">каждый</span><br>
                <span class="text-white">раунд</span>
            </h1>
            
            <p class="description">
                Выбери лайв-матч, привяжи команды, установи наказание — и следи кто сколько должен
            </p>
            
            <button class="cta-button" id="startButton">
                <span>НАЧАТЬ ИГРУ</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
            
            <div class="footer-text">БЕЗ РЕГИСТРАЦИИ · БЕСПЛАТНО · С ТЕЛЕФОНА</div>
        </div>
        
        <!-- Правая часть - изображение -->
        <div class="right-section">
            <img src="https://manus-storage.s3.amazonaws.com/cs_punisher_vertical_retro_271b6c23.png" alt="CS Round Punisher - Retro Art" class="retro-image">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
